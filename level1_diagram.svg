<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 550" width="100%" height="100%">
  <!-- Definitions for Gradients, Shadows and Markers -->
  <defs>
    <!-- Drop Shadow for Cards -->
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08" />
    </filter>

    <!-- Entity Gradient (Slate) -->
    <linearGradient id="entityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#E2E8F0" />
    </linearGradient>

    <!-- Process Gradient (Blue/Teal) -->
    <linearGradient id="processGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF" />
      <stop offset="100%" stop-color="#E0F2FE" />
    </linearGradient>

    <!-- Data Store Gradient (Amber/Orange) -->
    <linearGradient id="storeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF5" />
      <stop offset="100%" stop-color="#FEF3C7" />
    </linearGradient>

    <!-- Arrowhead Marker (Standard) -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#475569" />
    </marker>
  </defs>

  <!-- Background Canvas -->
  <rect width="950" height="550" fill="#F8FAFC" rx="16" stroke="#E2E8F0" stroke-width="1" />

  <!-- Title Block -->
  <g transform="translate(40, 40)">
    <text font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="20" font-weight="700" fill="#0F172A">
      ZET-5 Level 1 Data Flow Diagram
    </text>
    <text y="22" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="12" font-weight="500" fill="#64748B">
      DFD Level 1 — Metrology, Numerical Integration, and Triage Engine Decomposition
    </text>
  </g>

  <!-- ==================== EXTERNAL ENTITY 1: Synthetic Generator ==================== -->
  <g transform="translate(50, 100)" filter="url(#shadow)">
    <rect width="160" height="90" rx="4" fill="url(#entityGrad)" stroke="#64748B" stroke-width="2.5" />
    <rect x="4" y="4" width="152" height="82" rx="2" fill="none" stroke="#94A3B8" stroke-width="1" />
    <text x="80" y="40" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="13" font-weight="700" fill="#334155" text-anchor="middle">
      Synthetic Generator
    </text>
    <text x="80" y="60" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="10" font-weight="500" fill="#64748B" text-anchor="middle">
      [External Entity]
    </text>
  </g>

  <!-- ==================== EXTERNAL ENTITY 2: User ==================== -->
  <g transform="translate(50, 310)" filter="url(#shadow)">
    <rect width="160" height="90" rx="4" fill="url(#entityGrad)" stroke="#64748B" stroke-width="2.5" />
    <rect x="4" y="4" width="152" height="82" rx="2" fill="none" stroke="#94A3B8" stroke-width="1" />
    <text x="80" y="40" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="13" font-weight="700" fill="#334155" text-anchor="middle">
      User
    </text>
    <text x="80" y="60" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="10" font-weight="500" fill="#64748B" text-anchor="middle">
      [External Entity]
    </text>
  </g>

  <!-- ==================== PROCESS 1: Telemetry Ingestion ==================== -->
  <g transform="translate(290, 100)" filter="url(#shadow)">
    <rect width="180" height="90" rx="14" fill="url(#processGrad)" stroke="#0284C7" stroke-width="2.5" />
    <line x1="0" y1="28" x2="180" y2="28" stroke="#0284C7" stroke-width="1.5" />
    <text x="90" y="19" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="12" font-weight="800" fill="#0284C7" text-anchor="middle">
      1
    </text>
    <text x="90" y="52" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="13" font-weight="700" fill="#0369A1" text-anchor="middle">
      Telemetry Ingestion
    </text>
    <text x="90" y="70" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="10" fill="#0284C7" text-anchor="middle">
      Applies Power Factors
    </text>
  </g>

  <!-- ==================== PROCESS 2: Numerical Integration ==================== -->
  <g transform="translate(290, 260)" filter="url(#shadow)">
    <rect width="180" height="90" rx="14" fill="url(#processGrad)" stroke="#0284C7" stroke-width="2.5" />
    <line x1="0" y1="28" x2="180" y2="28" stroke="#0284C7" stroke-width="1.5" />
    <text x="90" y="19" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="12" font-weight="800" fill="#0284C7" text-anchor="middle">
      2
    </text>
    <text x="90" y="48" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="13" font-weight="700" fill="#0369A1" text-anchor="middle">
      Numerical Integration
    </text>
    <text x="90" y="66" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="10" fill="#0284C7" text-anchor="middle">
      Applies κ Drift Correction
    </text>
    <text x="90" y="80" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="9.5" fill="#0284C7" text-anchor="middle">
      Tracks Cumulative kWh
    </text>
  </g>

  <!-- ==================== PROCESS 3: Triage Engine ==================== -->
  <g transform="translate(590, 410)" filter="url(#shadow)">
    <rect width="180" height="90" rx="14" fill="url(#processGrad)" stroke="#0284C7" stroke-width="2.5" />
    <line x1="0" y1="28" x2="180" y2="28" stroke="#0284C7" stroke-width="1.5" />
    <text x="90" y="19" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="12" font-weight="800" fill="#0284C7" text-anchor="middle">
      3
    </text>
    <text x="90" y="52" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="13" font-weight="700" fill="#0369A1" text-anchor="middle">
      Triage Engine
    </text>
    <text x="90" y="72" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="10" fill="#0284C7" text-anchor="middle">
      Evaluates Runway Budget
    </text>
  </g>

  <!-- ==================== DATA STORE: D1 localJS Storage ==================== -->
  <g transform="translate(590, 260)" filter="url(#shadow)">
    <!-- Gane-Sarson open-ended rectangle: filled with custom borders -->
    <rect width="180" height="90" fill="url(#storeGrad)" />
    <!-- Draw left, top, bottom borders only (open right border) -->
    <path d="M 180,0 L 0,0 L 0,90 L 180,90" fill="none" stroke="#D97706" stroke-width="2.5" />
    <!-- Vertical divider separating store ID -->
    <line x1="45" y1="0" x2="45" y2="90" stroke="#D97706" stroke-width="1.5" />
    
    <!-- Store ID -->
    <text x="22.5" y="49" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="13" font-weight="800" fill="#B45309" text-anchor="middle">
      D1
    </text>
    <!-- Store Name -->
    <text x="112.5" y="44" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="13" font-weight="700" fill="#B45309" text-anchor="middle">
      localJS Storage
    </text>
    <text x="112.5" y="62" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="10" fill="#D97706" text-anchor="middle">
      (localStorage keys)
    </text>
  </g>

  <!-- ==================== DATA FLOWS (ARROWS) ==================== -->

  <!-- Flow: Generator -> Process 1 (raw Amps) -->
  <g>
    <path d="M 210,145 L 282,145" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="220" y="125" width="52" height="16" rx="3" fill="#F8FAFC" />
    <text x="246" y="137" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="10" font-weight="600" fill="#475569" text-anchor="middle">
      raw Amps
    </text>
  </g>

  <!-- Flow: Process 1 -> Process 2 (active power) -->
  <g>
    <path d="M 380,190 L 380,252" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="386" y="207" width="76" height="24" rx="3" fill="#F8FAFC" />
    <text x="390" y="218" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="10" font-weight="600" fill="#475569" text-anchor="start">
      active power
    </text>
    <text x="390" y="229" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="9.5" fill="#64748B" text-anchor="start">
      (real W / kW)
    </text>
  </g>

  <!-- Flow: User -> Process 2 (meter syncs) -->
  <g>
    <path d="M 210,345 L 250,345 L 250,305 L 282,305" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="214" y="315" width="62" height="26" rx="3" fill="#F8FAFC" />
    <text x="245" y="327" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="10" font-weight="600" fill="#475569" text-anchor="middle">
      meter sync
    </text>
    <text x="245" y="338" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">
      inputs
    </text>
  </g>

  <!-- Flow: Process 2 <-> D1 Storage (RHS signature & daily averages) -->
  <g>
    <!-- Bidirectional flow arrow line -->
    <path d="M 470,305 L 582,305" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
    <path d="M 580,305 L 478,305" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
    
    <rect x="477" y="258" width="105" height="42" rx="3" fill="#F8FAFC" />
    <text x="530" y="270" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="9.5" font-weight="600" fill="#475569" text-anchor="middle">
      RHS load profiles &amp;
    </text>
    <text x="530" y="282" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="9.5" font-weight="600" fill="#475569" text-anchor="middle">
      daily averages
    </text>
    <text x="530" y="294" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">
      (calibration updates)
    </text>
  </g>

  <!-- Flow: Process 2 -> Process 3 (Runway metrics) -->
  <g>
    <path d="M 380,350 L 380,455 L 582,455" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="390" y="425" width="168" height="26" rx="3" fill="#F8FAFC" />
    <text x="474" y="437" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="10" font-weight="600" fill="#475569" text-anchor="middle">
      remaining budget (kWh) &amp;
    </text>
    <text x="474" y="448" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="10" font-weight="600" fill="#475569" text-anchor="middle">
      projected runway metrics
    </text>
  </g>

  <!-- Flow: D1 Storage -> Process 3 (Setup Configurations) -->
  <g>
    <path d="M 680,350 L 680,402" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="686" y="362" width="90" height="26" rx="3" fill="#F8FAFC" />
    <text x="690" y="373" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="10" font-weight="600" fill="#475569" text-anchor="start">
      onboarding config,
    </text>
    <text x="690" y="384" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="10" font-weight="600" fill="#475569" text-anchor="start">
      target duration
    </text>
  </g>

  <!-- Flow: Process 3 -> User (Relay states & warnings) -->
  <g>
    <path d="M 680,500 L 680,520 L 130,520 L 130,408" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="315" y="508" width="220" height="18" rx="3" fill="#F8FAFC" />
    <text x="425" y="521" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="10" font-weight="600" fill="#475569" text-anchor="middle">
      relay shedding states, warnings &amp; alerts
    </text>
  </g>
</svg>
