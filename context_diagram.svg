<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 280" width="100%" height="100%">
  <!-- Definitions for Gradients, Shadows and Markers -->
  <defs>
    <!-- Drop Shadow for Cards -->
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08" />
    </filter>

    <!-- Entity Gradient (Slate) -->
    <linearGradient id="entityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#E2E8F0" />
    </linearGradient>

    <!-- Process Gradient (Blue/Teal) -->
    <linearGradient id="processGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF" />
      <stop offset="100%" stop-color="#E0F2FE" />
    </linearGradient>

    <!-- Arrowhead Marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#475569" />
    </marker>
  </defs>

  <!-- Background Canvas -->
  <rect width="850" height="280" fill="#F8FAFC" rx="16" stroke="#E2E8F0" stroke-width="1" />

  <!-- Title Block -->
  <g transform="translate(40, 45)">
    <text font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="20" font-weight="700" fill="#0F172A">
      ZET-5 System Context Diagram
    </text>
    <text y="22" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="12" font-weight="500" fill="#64748B">
      Data Flow Diagram (DFD) Level 0 — Absolute System Boundary
    </text>
  </g>

  <!-- ==================== EXTERNAL ENTITY 1: Synthetic Generator ==================== -->
  <g transform="translate(60, 110)" filter="url(#shadow)">
    <!-- Main Entity Box (Yourdon & Coad style: Sharp Double Border or strong outline) -->
    <rect width="180" height="110" rx="4" fill="url(#entityGrad)" stroke="#64748B" stroke-width="2.5" />
    <rect x="4" y="4" width="172" height="102" rx="2" fill="none" stroke="#94A3B8" stroke-width="1" />
    
    <!-- Title -->
    <text x="90" y="45" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="14" font-weight="700" fill="#334155" text-anchor="middle">
      Synthetic Generator
    </text>
    <text x="90" y="68" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="11" font-weight="400" fill="#64748B" text-anchor="middle">
      [External Entity]
    </text>
    <text x="90" y="85" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="10" font-style="italic" fill="#94A3B8" text-anchor="middle">
      (mockData.js)
    </text>
  </g>

  <!-- ==================== CENTRAL PROCESS: 0. ZET-5 System ==================== -->
  <g transform="translate(335, 110)" filter="url(#shadow)">
    <!-- Process Box (Gane-Sarson / Yourdon style: Rounded Rectangle with divided sections) -->
    <rect width="180" height="110" rx="16" fill="url(#processGrad)" stroke="#0284C7" stroke-width="2.5" />
    <!-- Horizontal Divider for Process ID -->
    <line x1="0" y1="32" x2="180" y2="32" stroke="#0284C7" stroke-width="1.5" />
    
    <!-- Process ID -->
    <text x="90" y="22" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="13" font-weight="800" fill="#0284C7" text-anchor="middle">
      0
    </text>
    <!-- Process Name -->
    <text x="90" y="65" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="15" font-weight="700" fill="#0369A1" text-anchor="middle">
      ZET-5 System
    </text>
    <text x="90" y="85" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="11" font-weight="400" fill="#0284C7" text-anchor="middle">
      [Central Process]
    </text>
  </g>

  <!-- ==================== EXTERNAL ENTITY 2: User ==================== -->
  <g transform="translate(610, 110)" filter="url(#shadow)">
    <!-- Main Entity Box -->
    <rect width="180" height="110" rx="4" fill="url(#entityGrad)" stroke="#64748B" stroke-width="2.5" />
    <rect x="4" y="4" width="172" height="102" rx="2" fill="none" stroke="#94A3B8" stroke-width="1" />
    
    <!-- Title -->
    <text x="90" y="45" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="14" font-weight="700" fill="#334155" text-anchor="middle">
      User
    </text>
    <text x="90" y="68" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="11" font-weight="400" fill="#64748B" text-anchor="middle">
      [External Entity]
    </text>
    <text x="90" y="85" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="10" font-style="italic" fill="#94A3B8" text-anchor="middle">
      (Operator/Homeowner)
    </text>
  </g>

  <!-- ==================== DATA FLOWS (ARROWS) ==================== -->

  <!-- Flow 1: Synthetic Generator -> ZET-5 System (Raw Load Profiles) -->
  <g>
    <path d="M 240,165 L 327,165" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
    <!-- Label Background -->
    <rect x="246" y="137" width="82" height="18" rx="3" fill="#F8FAFC" />
    <text x="287" y="150" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="10" font-weight="600" fill="#475569" text-anchor="middle">
      raw load profiles
    </text>
  </g>

  <!-- Flow 2: User -> ZET-5 System (Configuration Parameters) -->
  <g>
    <path d="M 610,140 L 523,140" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
    <!-- Label Background -->
    <rect x="526" y="98" width="80" height="34" rx="3" fill="#F8FAFC" />
    <text x="566" y="110" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="10" font-weight="600" fill="#475569" text-anchor="middle">
      token inputs,
    </text>
    <text x="566" y="124" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="10" font-weight="600" fill="#475569" text-anchor="middle">
      meter syncs
    </text>
  </g>

  <!-- Flow 3: ZET-5 System -> User (UI Visualisations) -->
  <g>
    <path d="M 515,190 L 602,190" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
    <!-- Label Background -->
    <rect x="522" y="196" width="84" height="18" rx="3" fill="#F8FAFC" />
    <text x="564" y="209" font-family="'Segoe UI', Roboto, Inter, sans-serif" font-size="10" font-weight="600" fill="#475569" text-anchor="middle">
      UI visualisations
    </text>
  </g>
</svg>
